name: "Update Documentation"

inputs:
  commit_version:
    description: "Commit version"
    required: true
    type: string

jobs:
  update-doc-src:
    # only run for commits which have version defined
    if: ${{ inputs.commit_version != '' }}
    runs-on: ubuntu-latest

    env:
      target_dir: './hsmcpp_doc'

    steps:
    # checkout docs repository
    - uses: actions/checkout@v4
      with:
        repository: 'igor-krechetov/hsmcpp-doc'
        token: ${{ secrets.HSMCPP_BOT_TOKEN }}
        ref: main
        submodules: 'recursive'
        path: ${{ env.target_dir }}
    - name: Import GPG key
      uses: crazy-max/ghaction-import-gpg@v5
      with:
        gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
        git_config_global: true
        git_user_signingkey: true
        git_commit_gpgsign: true
        workdir: ${{ env.target_dir }}

    - name: Update to latest hsmcpp
      run: |
        cd ${{ env.target_dir }}
        git submodule foreach git fetch --all
        git submodule foreach git reset --hard origin/main
        git add ./source/hsmcpp
    
    # Update documentation only if commit had version defined
    - name: Update documentation
      run: |
        cd ${{ env.target_dir }}
        echo "Found new hsmcpp version '${{ inputs.commit_version }}'"
        git commit -S -am "[auto] hsmcpp library updated to ${{ inputs.commit_version }}"
        git push
